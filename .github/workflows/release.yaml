name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          GOOS=linux GOARCH=amd64 go build -o oompa-linux-amd64 ./cmd/oompa
          GOOS=linux GOARCH=arm64 go build -o oompa-linux-arm64 ./cmd/oompa
          GOOS=darwin GOARCH=amd64 go build -o oompa-darwin-amd64 ./cmd/oompa
          GOOS=darwin GOARCH=arm64 go build -o oompa-darwin-arm64 ./cmd/oompa

      - name: Create timestamped release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TAG="build-$(date -u +%Y%m%d-%H%M%S)-${SHORT_SHA}"

          gh release create "$TAG" \
            --title "Build ${SHORT_SHA}" \
            --generate-notes \
            --target "${{ github.sha }}" \
            oompa-linux-amd64 \
            oompa-linux-arm64 \
            oompa-darwin-amd64 \
            oompa-darwin-arm64
