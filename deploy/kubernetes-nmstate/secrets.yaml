apiVersion: v1
kind: Secret
metadata:
  name: github-app-key
  namespace: oompa
type: Opaque
data: {}
  # app.pem: <base64-encoded private key>
  #
  # Create with:
  #   kubectl create secret generic github-app-key \
  #     --namespace oompa \
  #     --from-file=app.pem=/path/to/nmstate-ai.private-key.pem
