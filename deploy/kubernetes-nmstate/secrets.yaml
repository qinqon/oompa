apiVersion: v1
kind: Secret
metadata:
  name: gcp-credentials
  namespace: oompa
type: Opaque
data: {}
  # credentials.json: <base64-encoded GCP service account key>
  #
  # Create with:
  #   kubectl create secret generic gcp-credentials \
  #     --namespace oompa \
  #     --from-file=credentials.json=/path/to/gcp-sa-key.json
