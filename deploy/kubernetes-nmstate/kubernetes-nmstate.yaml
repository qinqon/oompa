apiVersion: v1
kind: Namespace
metadata:
  name: ai-agent-kubernetes-nmstate
---
# Create secrets with:
#   oc create secret generic github-app-key \
#     --namespace ai-agent-kubernetes-nmstate \
#     --from-file=app.pem=$HOME/.secrets/nmstate-ai.2026-04-10.private-key.pem
#
#   oc create secret generic gcp-credentials \
#     --namespace ai-agent-kubernetes-nmstate \
#     --from-file=credentials.json=$HOME/.secrets/nmstate-ai-agent-vertex.json
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-agent
  namespace: ai-agent-kubernetes-nmstate
  labels:
    app: ai-agent
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ai-agent
  template:
    metadata:
      labels:
        app: ai-agent
    spec:
      containers:
        - name: ai-agent
          image: ghcr.io/qinqon/github-issue-resolver:latest
          args:
            - --owner=nmstate
            - --repo=kubernetes-nmstate
            - --fork-owner=nmstate
            - --fork-repo=kubernetes-nmstate-ci
            - --clone-dir=/work
            - --log-level=debug
            - --poll-interval=30s
            - --reviewers=mkowalski,emy,qinqon,gemini-code-assist[bot]
          env:
            - name: GITHUB_APP_ID
              value: "3334701"
            - name: GITHUB_APP_INSTALLATION_ID
              value: "122852342"
            - name: GITHUB_APP_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: github-app-key
                  key: app.pem
            - name: GCP_CREDENTIALS_JSON
              valueFrom:
                secretKeyRef:
                  name: gcp-credentials
                  key: credentials.json
            - name: CLOUD_ML_REGION
              value: us-east5
            - name: ANTHROPIC_VERTEX_PROJECT_ID
              value: itpc-gcp-hcm-pe-eng-claude
          volumeMounts:
            - name: work
              mountPath: /work
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
      volumes:
        - name: work
          emptyDir: {}
