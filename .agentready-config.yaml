# AgentReady configuration for oompa (Go project)
# Some attributes are designed for Python/JS and don't map to Go conventions.

excluded_attributes:
  # Go uses cmd/ + pkg/ layout, not src/ + tests/
  - standard_layout
  # Design invariants are documented in AGENTS.md; no separate ADR directory
  - architecture_decisions
  # Go compiler enforces import cycles; no additional lint rule needed
  - architectural_boundaries
  # Internal CLI tool — no external attack surface
  - threat_model
